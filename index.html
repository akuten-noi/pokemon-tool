<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="Pokémon Champions専用の日本語対戦データベース">
<title>ポケモンチャンピオンズ 対戦データベース</title>
<style>
:root{--bg:#f5f7fb;--panel:#fff;--text:#172033;--muted:#667085;--line:#d9dfeb;--accent:#2f67d8;--soft:#eaf1ff}
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI","Noto Sans JP",sans-serif}
button,input,select{font:inherit} .app{max-width:1180px;margin:auto;padding:16px} h1{margin:0;font-size:clamp(1.35rem,3vw,2rem)}
.controls{position:sticky;top:0;z-index:5;display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;padding:8px 0 12px;background:rgba(245,247,251,.96);backdrop-filter:blur(8px)}
.list-toggle{padding:0 16px;border:1px solid var(--line);border-radius:12px;background:#fff;color:var(--text);font-weight:700;cursor:pointer;white-space:nowrap}.list-toggle:hover{background:var(--soft)}
input,select{width:100%;padding:12px;border:1px solid var(--line);border-radius:12px;background:#fff;color:var(--text)}
.layout{display:grid;grid-template-columns:minmax(0,1fr);gap:16px}.layout.list-open{grid-template-columns:300px minmax(0,1fr)} .sidebar,.detail{border:1px solid var(--line);border-radius:16px;background:var(--panel)}
.sidebar{padding:8px;max-height:calc(100vh - 150px);overflow:auto} .mon-btn{width:100%;border:0;background:transparent;padding:10px 11px;border-radius:10px;display:flex;justify-content:space-between;gap:8px;text-align:left;color:var(--text);cursor:pointer}
.mon-btn:hover,.mon-btn.active{background:var(--soft)} .dex{color:var(--muted);font-size:.8rem;white-space:nowrap} .detail{padding:18px;min-width:0}
.head{display:flex;justify-content:space-between;gap:12px} .name{margin:0;font-size:1.65rem} .chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.chip{border:1px solid var(--line);border-radius:999px;padding:3px 9px;background:#fafbfc;font-size:.82rem} .section{margin-top:22px} .section h2{margin:0 0 10px;font-size:1rem}
.stats{display:grid;grid-template-columns:repeat(6,1fr);gap:7px} .stat.total{grid-column:1/-1} .stat,.speed,.ability{border:1px solid var(--line);border-radius:11px;padding:10px;background:#fbfcfe}
.stat{text-align:center} .label{color:var(--muted);font-size:.76rem} .value{font-weight:750;font-size:1.15rem} .speed-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.speed{text-align:center} .speed:first-child{background:var(--soft);border-color:#b9cdf8} .help{color:var(--muted);font-size:.82rem;margin:0 0 8px}
.abilities{display:grid;grid-template-columns:repeat(3,1fr);gap:7px} .moves-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:9px}
.move-search{max-width:280px;padding:9px 11px} .move-groups{display:grid;grid-template-columns:repeat(3,1fr);gap:10px} .move-group{border:1px solid var(--line);border-radius:12px;overflow:hidden}
.move-group h3{margin:0;padding:9px 11px;background:#f2f5fa;font-size:.9rem;border-bottom:1px solid var(--line)} .move-list{list-style:none;margin:0;padding:0}
.move-list li{padding:8px 11px;border-bottom:1px solid #edf0f5;font-size:.9rem} .move-list li:last-child{border-bottom:0} .empty{color:var(--muted);padding:25px;text-align:center}
.footer{color:var(--muted);font-size:.8rem;margin-top:22px;padding-top:12px;border-top:1px solid var(--line)}
@media(max-width:800px){.controls{grid-template-columns:minmax(0,1fr) auto}.list-toggle{padding:0 11px;font-size:.84rem}.layout,.layout.list-open{grid-template-columns:1fr}.sidebar{max-height:220px;order:0}.detail{order:1}.stats{grid-template-columns:repeat(3,1fr)}.speed-grid{grid-template-columns:repeat(2,1fr)}.abilities{grid-template-columns:1fr}.move-groups{grid-template-columns:1fr}}

.move-groups{display:grid!important;grid-template-columns:1fr!important;gap:14px}
.move-group{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:#fff}
.move-group h3{margin:0;padding:11px 13px;background:#f2f5fa;font-size:1rem;border-bottom:1px solid var(--line);display:flex;justify-content:space-between}
.move-list{list-style:none;margin:0;padding:0}
.move-item{border-bottom:1px solid #edf0f5}.move-item:last-child{border-bottom:0}
.move-button{width:100%;border:0;background:#fff;color:var(--text);padding:11px 13px;display:flex;justify-content:space-between;align-items:center;text-align:left;cursor:pointer}
.move-button:hover{background:#f8faff}.move-name{font-weight:700}
.move-type{font-size:.78rem;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:2px 8px}
.move-detail{display:none;padding:0 13px 12px;background:#fbfcfe}.move-item.open .move-detail{display:block}
.move-specs{display:grid;grid-template-columns:repeat(6,1fr);gap:7px}
.move-spec{border:1px solid var(--line);border-radius:9px;padding:8px;text-align:center;background:#fff}
@media(max-width:800px){.move-specs{grid-template-columns:repeat(2,1fr)}}


.ability-item{
  border:1px solid var(--line);
  border-radius:11px;
  overflow:hidden;
  background:#fbfcfe
}
.ability-button{
  width:100%;
  border:0;
  background:transparent;
  color:var(--text);
  padding:11px 12px;
  text-align:left;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px
}
.ability-button:hover{background:#f5f8ff}
.ability-name{font-weight:750}
.ability-toggle{color:var(--muted);font-size:.82rem;white-space:nowrap}
.ability-detail{
  display:none;
  padding:0 12px 12px;
  color:var(--text);
  line-height:1.7;
  font-size:.9rem
}
.ability-item.open .ability-detail{display:block}


/* タイプカラーとタイプ相性 */
.chip,.type-badge{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:66px;padding:4px 12px;border-radius:9999px;
  font-size:.82rem;font-weight:800;line-height:1.25;
  color:#fff;border:1px solid rgba(0,0,0,.08);
  box-shadow:inset 0 -1px 0 rgba(0,0,0,.12);
  white-space:nowrap
}
.chips,.type-badges{display:flex;flex-wrap:wrap;gap:7px}
.type-Normal{background:#A8A878}.type-Fire{background:#F08030}.type-Water{background:#6890F0}.type-Electric{background:#F8D030;color:#342f14}.type-Grass{background:#78C850}.type-Ice{background:#98D8D8;color:#263c3c}.type-Fighting{background:#C03028}.type-Poison{background:#A040A0}.type-Ground{background:#E0C068;color:#3d3420}.type-Flying{background:#A890F0}.type-Psychic{background:#F85888}.type-Bug{background:#A8B820}.type-Rock{background:#B8A038}.type-Ghost{background:#705898}.type-Dragon{background:#7038F8}.type-Dark{background:#705848}.type-Steel{background:#B8B8D0;color:#292936}.type-Fairy{background:#EE99AC;color:#42242b}
.matchup-section{margin-top:14px;padding:14px 16px;background:#f8faff;border:1px solid var(--line);border-radius:14px}
.matchup-title{margin:0 0 10px;font-size:1rem}
.matchup-grid{display:grid;gap:9px}
.matchup-row{display:grid;grid-template-columns:72px 1fr;align-items:start;gap:9px}
.matchup-label{font-weight:850;font-size:.84rem;padding-top:5px}
.matchup-label.x4,.matchup-label.x2{color:#c72b2b}.matchup-label.x05,.matchup-label.x025{color:#18794e}.matchup-label.x0{color:#49566c}
.matchup-note{margin:9px 0 0;color:var(--muted);font-size:.76rem}
.move-type.type-badge{min-width:58px;padding:2px 9px;font-size:.72rem;color:#fff;border:none}
.move-type.type-Electric,.move-type.type-Ice,.move-type.type-Ground,.move-type.type-Steel,.move-type.type-Fairy{color:#292936}
@media(max-width:520px){.matchup-row{grid-template-columns:58px 1fr}.chip,.type-badge{min-width:58px;padding:4px 9px}}


.move-extra{margin-top:12px;display:grid;gap:10px}.move-extra-row{background:#f7f9fc;border:1px solid #e3e8f0;border-radius:10px;padding:10px 12px}.move-extra-label{font-size:.78rem;font-weight:800;color:#5b6574;margin-bottom:5px}.move-extra-text{line-height:1.65;color:#202631}.move-tags{display:flex;flex-wrap:wrap;gap:6px}.move-tag{display:inline-flex;align-items:center;min-height:24px;padding:2px 10px;border-radius:999px;background:#e9edf3;border:1px solid #d4dae4;color:#303744;font-size:.78rem;font-weight:800;white-space:nowrap}.move-tag.important{background:#fff4d8;border-color:#efd28a;color:#664b00}.move-tag.ability{background:#e9f3ff;border-color:#bad6f5;color:#164e86}.move-note{font-size:.75rem;color:#6b7280;margin-top:8px;line-height:1.5}
.move-tag.defense{border-color:#8b5cf6;background:rgba(139,92,246,.12)}
.move-category{display:inline-flex;align-items:center;justify-content:center;min-width:48px;padding:2px 8px;border-radius:999px;background:#eef1f5;border:1px solid #d8dde5;color:#303744;font-size:.72rem;font-weight:800;line-height:1.25;white-space:nowrap}.move-button{justify-content:flex-start;gap:8px}.move-name{flex:0 0 13em;min-width:0;font-weight:700}.move-button .move-type{margin-left:0}.move-group.all-moves h3{justify-content:space-between}@media(max-width:600px){.move-name{flex-basis:9.5em}.move-button{gap:6px;padding-left:10px;padding-right:10px}.move-category{min-width:44px;padding-left:6px;padding-right:6px}.move-type.type-badge{min-width:52px;padding-left:7px;padding-right:7px}}

.ability-info-block{display:grid;gap:12px}
.ability-info-section{display:grid;gap:5px}
.ability-info-heading{font-size:.78rem;font-weight:850;color:#4b5563;letter-spacing:.02em}
.ability-info-body{line-height:1.72;color:#202631}
.ability-info-list{margin:0;padding-left:1.25rem;display:grid;gap:4px}


/* ポケモン詳細タブ */
.detail-tabs{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin:18px 0 4px;padding:6px;background:#eef3fb;border:1px solid var(--line);border-radius:14px;position:sticky;top:8px;z-index:20;box-shadow:0 4px 14px rgba(28,48,86,.08)}
.detail-tab{border:0;border-radius:10px;padding:11px 10px;background:transparent;color:var(--muted);font-weight:800;font-size:.92rem;cursor:pointer;line-height:1.35}
.detail-tab:hover{background:rgba(255,255,255,.72);color:var(--text)}
.detail-tab.active{background:#fff;color:#1f5fc4;box-shadow:0 2px 8px rgba(31,95,196,.14)}
.detail-tab-panel{display:none}.detail-tab-panel.active{display:block}
.build-guide{margin-top:20px;border:1px solid var(--line);border-radius:14px;background:#fbfcfe;padding:18px}
.build-guide h2{margin:0 0 8px;font-size:1.1rem}.build-guide p{margin:0;color:var(--muted);line-height:1.75}
.build-placeholder-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:16px}
.build-placeholder{border:1px dashed #bcc8da;border-radius:12px;padding:14px;background:#fff}.build-placeholder strong{display:block;margin-bottom:5px}
@media(max-width:800px){.detail-tabs{position:static;grid-template-columns:1fr}.build-placeholder-grid{grid-template-columns:1fr}}


/* 覚える技：説明を常時表示するコンパクトレイアウト */
.move-group{border-radius:10px}
.move-group h3{padding:7px 10px;font-size:.86rem}
.move-item{padding:0;background:#fff}
.move-summary{display:flex;align-items:center;gap:6px;padding:7px 9px 5px;background:#fff}
.move-name{flex:0 0 12em;font-size:.88rem;line-height:1.3}
.move-category{min-width:42px;padding:1px 6px;font-size:.66rem}
.move-type.type-badge{min-width:50px;padding:2px 7px;font-size:.66rem}
.move-detail{display:grid!important;grid-template-columns:1fr;gap:5px;padding:0 9px 8px;background:#fff}
.move-specs{display:grid;grid-template-columns:repeat(4,minmax(42px,.72fr)) minmax(92px,1.65fr);gap:4px;align-self:start}
.move-spec{min-width:0;border-radius:7px;padding:5px 3px;font-size:.78rem}
.move-spec .label{font-size:.66rem;line-height:1.15}
.move-spec-target{padding-left:5px;padding-right:5px}
.move-spec-target>div:last-child{font-size:.72rem;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.move-extra{margin-top:0;gap:5px}
.move-extra-row{display:grid;grid-template-columns:92px minmax(0,1fr);align-items:start;gap:7px;border-radius:7px;padding:5px 7px}
.move-extra-label{margin:0;font-size:.68rem;line-height:1.45}
.move-extra-text{font-size:.78rem;line-height:1.45}
.move-tags{gap:4px}
.move-tag{min-height:20px;padding:1px 7px;font-size:.68rem}
.move-note{margin-top:4px;font-size:.68rem;line-height:1.4}
.moves-head{margin-bottom:6px}.move-search{padding:7px 9px}.move-groups{gap:8px!important}
@media(max-width:900px){.move-name{flex-basis:10em}}
@media(max-width:680px){
  .move-summary{flex-wrap:wrap;padding:7px 8px 4px}
  .move-name{flex:1 1 100%;font-size:.9rem}
  .move-detail{grid-template-columns:1fr;padding:0 8px 8px}
  .move-specs{grid-template-columns:repeat(4,minmax(34px,.72fr)) minmax(86px,1.65fr);gap:3px}
  .move-spec{padding:5px 2px;font-size:.72rem}
  .move-spec .label{font-size:.6rem}
  .move-spec-target{padding-left:3px;padding-right:3px}
  .move-spec-target>div:last-child{font-size:.65rem}
  .move-extra-row{grid-template-columns:76px minmax(0,1fr)}
}

.move-target-note{margin-top:2px;font-size:11px;color:var(--muted);line-height:1.35}

/* 3タブ共通：コンパクト表示 */
.detail{padding:12px 14px;font-size:.88rem}
.head{align-items:flex-start;gap:8px}.name{font-size:1.35rem;line-height:1.15}.dex{font-size:.72rem}
.chips{margin-top:5px;gap:4px}.chip{min-width:54px;padding:2px 8px;font-size:.72rem}
.detail-tabs{margin:10px 0 6px;padding:4px;gap:4px;border-radius:10px;top:4px}
.detail-tab{padding:7px 8px;font-size:.82rem;border-radius:7px}
.section{margin-top:10px}.section h2,.matchup-title{margin:0 0 5px;font-size:.86rem}
.help{font-size:.72rem;margin:0 0 5px;line-height:1.45}

/* 基本情報：見渡しやすいダッシュボード */
.overview-dashboard{display:grid;grid-template-columns:minmax(0,1.15fr) minmax(300px,.85fr);gap:8px;align-items:start}
.overview-main,.overview-side{display:grid;gap:8px;min-width:0}
.overview-dashboard .section,.overview-dashboard .matchup-section{margin-top:0}
.matchup-section{padding:8px 10px;border-radius:9px}
.matchup-grid{gap:4px}.matchup-row{grid-template-columns:54px 1fr;gap:5px;align-items:center}
.matchup-label{font-size:.72rem;padding-top:0}.matchup-note{margin-top:5px;font-size:.66rem;line-height:1.35}
.type-badges{gap:4px}.type-badge{min-width:48px;padding:2px 7px;font-size:.68rem}
.stats{grid-template-columns:repeat(6,minmax(0,1fr));gap:4px}
.stat,.speed,.ability{border-radius:7px;padding:5px 4px}
.stat .label,.speed .label{font-size:.66rem}.stat .value,.speed .value{font-size:.92rem;line-height:1.2}
.speed-grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:4px}
.abilities-section{grid-column:1/-1}
.abilities{grid-template-columns:repeat(3,minmax(0,1fr));gap:5px}
.ability-item{border-radius:8px;padding:7px 8px;overflow:visible}
.ability-button{display:block;padding:0;background:transparent;cursor:default}
.ability-button:hover{background:transparent}
.ability-name{display:block;font-size:.82rem;line-height:1.25;margin-bottom:3px}
.ability-toggle{display:none}
.ability-detail{display:block!important;padding:0;font-size:.72rem;line-height:1.45}
.ability-info-block{gap:5px}.ability-info-section{gap:2px}
.ability-info-heading{font-size:.66rem}.ability-info-body{line-height:1.45}.ability-info-list{gap:2px;padding-left:1rem}

/* 覚える技：基本情報と同じ密度に統一 */
.moves-head{margin-bottom:5px;gap:7px}.move-search{max-width:220px;padding:6px 8px;font-size:.78rem}
.move-groups{gap:6px}.move-group{border-radius:8px}.move-group h3{padding:5px 7px;font-size:.76rem}
.move-summary{gap:4px;padding:5px 7px 3px}.move-name{flex:0 0 10.5em;font-size:.78rem}
.move-category{min-width:38px;padding:1px 5px;font-size:.6rem}.move-type.type-badge{min-width:45px;padding:1px 6px;font-size:.6rem}
.move-detail{grid-template-columns:180px minmax(0,1fr);gap:5px;padding:0 7px 6px}
.move-specs{gap:3px}.move-spec{padding:4px 2px;font-size:.68rem;border-radius:5px}
.move-extra{margin-top:0;gap:4px}.move-extra-row{padding:6px 8px;border-radius:7px}
.move-extra-label{font-size:.66rem;margin-bottom:2px}.move-extra-text{font-size:.73rem;line-height:1.45}
.move-tags{gap:3px}.move-tag{min-height:19px;padding:1px 7px;font-size:.64rem}

/* 育成論：同じ枠・文字密度へ */
.build-guide{margin-top:8px;padding:10px;border-radius:9px}
.build-guide h2{margin:0 0 4px;font-size:.88rem}.build-guide p{font-size:.76rem;line-height:1.5}
.build-placeholder-grid{gap:6px;margin-top:8px}.build-placeholder{padding:8px 9px;border-radius:8px;font-size:.78rem}
.build-placeholder strong{margin-bottom:2px;font-size:.8rem}
.footer{font-size:.68rem;margin-top:10px;padding-top:7px}

@media(max-width:980px){
  .overview-dashboard{grid-template-columns:1fr}
  .overview-side{grid-template-columns:1fr 1fr}
  .abilities-section{grid-column:auto}
  .abilities{grid-template-columns:1fr}
}
@media(max-width:800px){
  .detail{padding:10px}.detail-tabs{position:static;grid-template-columns:repeat(4,minmax(0,1fr))}
  .overview-side{grid-template-columns:1fr}.abilities{grid-template-columns:1fr}
  .move-detail{grid-template-columns:1fr}.move-name{flex:1 1 auto}
}
@media(max-width:520px){
  .detail{font-size:.84rem}.name{font-size:1.2rem}.detail-tab{font-size:.74rem;padding:6px 3px}
  .stats{grid-template-columns:repeat(3,1fr)}.speed-grid{grid-template-columns:repeat(2,1fr)}
  .matchup-row{grid-template-columns:48px 1fr}.type-badge{min-width:44px}
  .move-summary{flex-wrap:wrap}.move-name{flex:1 0 100%}.move-search{max-width:150px}
}


/* 覚える技：技名・タイプ・分類・重要タグを1行に統合 */
.move-summary{flex-wrap:wrap;align-items:center;gap:5px 6px}
.move-name{flex:0 0 auto;min-width:10em}
.move-header-tags{display:inline-flex;flex-wrap:wrap;align-items:center;gap:4px;min-width:0}
.move-summary .move-tag{min-height:20px;padding:1px 7px;font-size:.68rem}
.move-extra{grid-column:auto}
.moves-head{justify-content:flex-start}
@media(max-width:680px){
  .move-summary{padding:7px 8px 5px}
  .move-name{flex:0 0 100%;min-width:0}
  .move-header-tags{flex:1 1 100%}
}

/* ダメージ計算 */
.damage-calculator{margin-top:8px;display:grid;gap:8px}
.damage-columns{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
.damage-card{border:1px solid var(--line);border-radius:9px;background:#fbfcfe;padding:9px}
.damage-card h2{margin:0 0 7px;font-size:.88rem}
.damage-side-head{display:grid;grid-template-columns:minmax(0,1fr) minmax(260px,.9fr);gap:8px;align-items:start;margin-bottom:7px}
.damage-side-head .damage-field{margin-top:0}
.damage-base-stats{border:1px solid var(--line);border-radius:8px;background:#fff;padding:6px}
.damage-base-stats-title{font-size:.66rem;font-weight:900;color:var(--muted);margin-bottom:4px}
.damage-base-stats-grid{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:3px}
.damage-base-stat{border:1px solid #e1e7f0;border-radius:6px;background:#f8fafc;padding:4px 2px;text-align:center;min-width:0}
.damage-base-stat .label{font-size:.56rem;white-space:nowrap;color:var(--muted)}
.damage-base-stat strong{display:block;font-size:.72rem;margin-top:1px}
.damage-field{display:grid;grid-template-columns:100px minmax(0,1fr);align-items:center;gap:7px;margin-top:6px}
.damage-field>label{font-size:.72rem;font-weight:800;color:var(--muted)}
.damage-field input,.damage-field select{padding:7px 8px;border-radius:8px;font-size:.76rem}
.point-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:5px;margin-top:8px}
.point-item{border:1px solid var(--line);border-radius:7px;background:#fff;padding:5px}
.point-item label{display:flex;justify-content:space-between;gap:4px;font-size:.68rem;color:var(--muted);margin-bottom:3px}
.point-item input{padding:0;border:0;border-radius:6px}.damage-field input[type="range"],.point-item input[type="range"]{width:100%;accent-color:var(--accent)}.range-value{text-align:right;font-size:.66rem;font-weight:800;color:var(--muted);margin-top:2px}
.point-total{margin-top:7px;padding:6px 8px;border-radius:7px;background:var(--soft);font-size:.72rem;font-weight:800}
.point-total.over{background:#fff0f0;color:#b42318}
.damage-options{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px}
.damage-check{display:flex;align-items:center;gap:5px;border:1px solid var(--line);border-radius:8px;background:#fff;padding:7px 8px;font-size:.72rem}
.damage-check input{width:auto;margin:0}
.damage-section-label{font-size:.72rem;font-weight:900;color:var(--muted);margin:7px 0 4px}
.choice-row{display:flex;flex-wrap:wrap;gap:5px}
.choice-pill{position:relative;display:inline-flex;align-items:center;gap:5px;border:1px solid var(--line);border-radius:8px;background:#fff;padding:6px 8px;font-size:.7rem;cursor:pointer;user-select:none}
.choice-pill input{position:absolute;opacity:0;pointer-events:none}
.choice-pill::before{content:"";display:grid;place-items:center;width:15px;height:15px;border:1px solid #aeb9c9;border-radius:4px;background:#fff;font-size:11px;font-weight:900;color:#fff}
.choice-pill:has(input:checked){border-color:var(--accent);background:#eef4ff;color:#174da8;font-weight:800}
.choice-pill:has(input:checked)::before{content:"✓";border-color:var(--accent);background:var(--accent)}
.choice-help{margin-top:5px;font-size:.66rem;line-height:1.45;color:var(--muted)}
.damage-result{border:2px solid #7a4fc4;border-radius:10px;background:linear-gradient(135deg,#f7f1ff,#efe5ff);padding:11px;box-shadow:0 4px 16px rgba(86,47,140,.16)}
.damage-result::before{content:"計算結果";display:inline-block;margin-bottom:6px;padding:3px 9px;border-radius:999px;background:#6e45b8;color:#fff;font-size:.68rem;font-weight:900;letter-spacing:.04em}
.damage-choice-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:4px}
.damage-rank-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:4px}
.damage-choice-grid .choice-pill,.damage-rank-grid .choice-pill{justify-content:center;padding:5px 3px}
.pokemon-search-row{display:grid;grid-template-columns:100px minmax(0,1fr);align-items:center;gap:7px;margin-top:6px}
.pokemon-search-row label{font-size:.72rem;font-weight:800;color:var(--muted)}
.pokemon-search-row input{padding:7px 8px;border:1px solid var(--line);border-radius:8px;font-size:.76rem;width:100%}
.move-select-wrap{position:relative;min-width:0}
.damage-move-picker{position:relative}
.damage-move-picker-button{width:100%;display:flex;align-items:center;gap:5px;padding:8px 30px 8px 9px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--text);font:inherit;text-align:left;cursor:pointer}
.damage-move-picker-button::after{content:"▼";position:absolute;right:10px;font-size:.65rem;color:var(--muted)}
.damage-move-picker-name{font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.damage-move-picker-meta{font-size:.72rem;color:var(--muted);white-space:nowrap}
.damage-move-menu{position:absolute;z-index:80;left:0;right:0;top:calc(100% + 4px);max-height:280px;overflow:auto;border:1px solid var(--line);border-radius:9px;background:#fff;box-shadow:0 8px 24px rgba(20,40,80,.18);padding:4px}
.damage-move-option{width:100%;display:flex;align-items:center;gap:5px;border:0;border-radius:7px;background:#fff;padding:7px 8px;color:var(--text);text-align:left;cursor:pointer}
.damage-move-option:hover,.damage-move-option.active{background:var(--soft)}
.damage-move-option .type-badge{flex:0 0 auto;min-width:48px;padding:2px 7px;font-size:.66rem}
.damage-move-option-name{font-weight:800;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.damage-move-option-meta{margin-left:auto;font-size:.68rem;color:var(--muted);white-space:nowrap}
.pokemon-select-wrap{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:6px;align-items:center;min-width:0}
.pokemon-type-badges{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.pokemon-type-badges .type-badge{min-width:48px;padding:2px 7px;font-size:.66rem}

.damage-result-main{font-size:1.1rem;font-weight:900;margin-bottom:5px}
.damage-result-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:5px}
.damage-result-cell{border:1px solid #d4e0f7;border-radius:7px;background:#fff;padding:6px;text-align:center}
.damage-result-cell .label{font-size:.64rem}.damage-result-cell strong{display:block;font-size:.82rem;margin-top:2px}
.damage-bar{height:12px;border-radius:999px;background:#e5eaf2;overflow:hidden;margin-top:8px}
.damage-bar>span{display:block;height:100%;background:#2f67d8;width:0}
.damage-note{margin-top:6px;color:var(--muted);font-size:.68rem;line-height:1.45}

.item-help{margin:-2px 0 7px 94px;font-size:.64rem;line-height:1.4;color:var(--muted)}
.damage-side-head{display:flex;flex-direction:column;gap:7px}
.damage-side-head .damage-base-stats{order:0;width:100%}
.damage-side-head .damage-field{order:1;width:100%}
.damage-result{position:sticky;bottom:8px;z-index:30;box-shadow:0 -3px 18px rgba(20,40,80,.16);backdrop-filter:blur(5px)}
.damage-calculator{padding-bottom:10px}
.hp-gauge{position:relative;height:24px;border:2px solid #29313d;border-radius:6px;background:#202733;overflow:hidden;margin-top:9px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.15)}
.hp-gauge-fill{height:100%;width:100%;transition:width .2s ease;background:#45b84c}
.hp-gauge-fill.hp-yellow{background:#e5c42f}.hp-gauge-fill.hp-red{background:#e14a42}
.hp-gauge-text{position:absolute;inset:0;display:grid;place-items:center;color:#fff;font-size:.72rem;font-weight:900;text-shadow:0 1px 2px #000;white-space:nowrap}
.hazard-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px;margin-top:5px}
.hazard-select{display:flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:8px;background:#fff;padding:6px 8px;font-size:.7rem}.hazard-select select{padding:5px;min-width:0}
@media(max-width:800px){.damage-columns{grid-template-columns:1fr}.damage-options{grid-template-columns:repeat(2,minmax(0,1fr))}.damage-result{bottom:4px}.hazard-grid{grid-template-columns:1fr 1fr}}
@media(max-width:520px){.damage-rank-grid{grid-template-columns:repeat(5,minmax(0,1fr))}.pokemon-search-row{grid-template-columns:82px minmax(0,1fr)}.detail-tabs{gap:2px}.detail-tab{font-size:.68rem;padding:6px 1px}.damage-field{grid-template-columns:82px minmax(0,1fr)}.point-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.damage-result-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.damage-side-head{gap:7px}.damage-side-head .damage-field{width:100%}.damage-side-head select{width:100%;min-width:0}.damage-base-stats{width:100%}.damage-base-stats-grid{grid-template-columns:repeat(6,minmax(0,1fr))}.damage-base-stat{padding:3px 1px}.damage-base-stat .label{font-size:.52rem}.damage-base-stat strong{font-size:.67rem}.item-help{margin:-2px 0 7px 82px}.damage-result{padding:8px}.damage-result-main{font-size:.9rem}.damage-note{max-height:54px;overflow:auto}.hazard-grid{grid-template-columns:1fr}}


.controls{flex-wrap:wrap}
.damage-page-toggle{font-weight:900}
.damage-page-toggle.active{background:var(--accent);color:#fff;border-color:var(--accent)}
@media(max-width:620px){.controls input{flex:1 1 100%}.controls .list-toggle{flex:1 1 calc(50% - 4px)}}

.mega-switch-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:6px}
.mega-switch-label{font-size:.72rem;font-weight:800;color:var(--muted);min-width:100px}
.mega-switch-buttons{display:flex;gap:5px;flex-wrap:wrap}
.mega-switch-btn{border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--text);padding:6px 10px;font-size:.7rem;font-weight:800;cursor:pointer}
.mega-switch-btn:hover{background:var(--soft)}
.mega-switch-btn.active{border-color:var(--accent);background:var(--accent);color:#fff}
@media(max-width:520px){.mega-switch-label{min-width:82px}}

</style>

function defensiveMatchups(defenderTypes){
  return TYPE_ORDER.map(atk=>{
    let mult=1;
    defenderTypes.forEach(def=>{mult*=((TYPE_CHART[atk]||{})[def]??1)});
    return {type:atk,mult};
  });
}
function matchupHtml(types){
  const groups=[[4,"4倍","x4"],[2,"2倍","x2"],[.5,"0.5倍","x05"],[.25,"0.25倍","x025"],[0,"無効","x0"]];
  const data=defensiveMatchups(types);
  const rows=groups.map(([mult,label,cls])=>{
    const hits=data.filter(x=>x.mult===mult);
    if(!hits.length)return "";
    return `<div class="matchup-row"><div class="matchup-label ${cls}">${label}</div><div class="type-badges">${hits.map(x=>typeBadge(x.type)).join("")}</div></div>`;
  }).join("");

}

function hiraToKata(v){return String(v||"").replace(/[ぁ-ゖ]/g,ch=>String.fromCharCode(ch.charCodeAt(0)+0x60))}
function norm(v){return hiraToKata(String(v||"").normalize("NFKC").toLowerCase()).replace(/[\s・ー_\-（）()]/g,"")}
function searchable(p){return p.name}
function filtered(){
  const q=norm(query);
  const mons=POKEMON.filter(p=>(!q||norm(p.name).includes(q)));
  if(!q)return mons;
  return mons.map((p,index)=>{
    const name=norm(p.name);
    const isMega=p.name.startsWith("メガ");
    const rank=(!isMega&&name.startsWith(q))?0:(isMega&&name.startsWith(q))?2:1;
    return {p,index,rank};
  }).sort((a,b)=>a.rank-b.rank||a.index-b.index).map(x=>x.p);
}
function calcSpeed(base,ev,nature){const raw=Math.floor(((2*base+31+Math.floor(ev/4))*50)/100)+5;return Math.floor(raw*nature)}
function speeds(base){return [["最速",calcSpeed(base,252,1.1)],["準速",calcSpeed(base,252,1)],["無振り",calcSpeed(base,0,1)],["最遅",calcSpeed(base,0,.9)]]}

function normalizeMoveEffectText(text){
 if(!text) return "";
 let out=text.trim();
 // 威力・分類から自明な説明は削除し、固有効果だけを残す。
 out=out.replace(/^相手に大ダメージを与える。\s*/,"");
 out=out.replace(/^相手にダメージを与える。\s*/,"");
 out=out.replace(/^相手にダメージを与え、/,"");
 out=out.replace(/^通常攻撃。追加効果はない。\s*/,"");
 out=out.replace(/^通常攻撃。/,"");
 out=out.replace(/\s*ダブルバトルで複数のポケモンを対象にした場合、各対象へのダメージは通常の0\.75倍になる。/g,"");
 out=out.replace(/\s*ダブルバトルでは複数対象補正を受ける。/g,"");
 out=out.replace(/\s*ダブルバトルで複数対象補正を受ける。/g,"");
 out=out.replace(/\s*野生ポケモンとの戦闘では戦闘を終了させる。/g,"");
 // 自分への能力下降・反動は命中時にだけ発動することを明示する。
 out=out.replace(/^攻撃後、自分の(攻撃|防御|特攻|特防|素早さ)/,"攻撃後（命中時）、自分の$1");
 out=out.replace(/^攻撃後、自分の攻撃と防御/,"攻撃後（命中時）、自分の攻撃と防御");
 out=out.replace(/^攻撃後、自分の防御と特防/,"攻撃後（命中時）、自分の防御と特防");
 return out.trim();
}

 rawTags.forEach(t=>{
   if(/接触/.test(t)) add("接触技");

 });
 defenseInteractionFlags(name,info,target).forEach(add);
 if(ALWAYS_HIT_MOVES.has(name) && !/必中|必ず命中/.test(effect)) effect=[effect,"必中技。命中率・回避率の変化に関係なく命中する。"].filter(Boolean).join(" ");

 if(info.category!=="変化") POWER_ABILITY_NOTES.forEach(rule=>{if(rule.test(name)){

   if(/メガランチャー/.test(rule.text)) add("メガランチャー");
 }});

function baseFixedStat(p,key){
  if(p.name==="ヌケニン"&&key==="hp")return 1;
  return p.stats[key]+(key==="hp"?75:20);
}
function correctionMultiplier(kind,stat){
  if(["0.9","1.0","1.1"].includes(String(kind)))return Number(kind);
  if(kind===stat+"Up")return 1.1;
  if(kind===stat+"Down")return .9;
  return 1;
}
function rankMultiplier(rank){return rank>=0?(2+rank)/2:2/(2-rank)}
function finalStat(p,key,points,correction){
  const raw=baseFixedStat(p,key)+Number(points||0);
  return key==="hp"?raw:Math.floor(raw*correctionMultiplier(correction,key));
}
function typeMultiplier(moveType,defTypes){
  const atk=typeKey(moveType);let m=1;
  defTypes.forEach(t=>{m*=((TYPE_CHART[atk]||{})[typeKey(t)]??1)});
  return m;
}

    <div class="damage-move-menu" data-move-picker-menu hidden>${moves.map(({name,info})=>{const p=Number(info.power)>0?`威力${info.power}・`:"";return `<button class="damage-move-option ${name===selected.name?"active":""}" type="button" data-move-value="${name}"><span class="damage-move-option-name">${name}</span>${typeBadge(info.type)}<span class="damage-move-option-meta">${p}${info.category}</span></button>`}).join("")}</div>
  </div>`;
}
const DAMAGE_ITEMS={

};
function itemOptions(selected,side){
  const allowed=side==="atk"?["none","choiceBand","choiceSpecs","lifeOrb","muscleBand","wiseGlasses","expertBelt","typeBoost","lightBall","metronome"]:["none","resistBerry","ironBall"];
  if(!allowed.includes(selected))selected="none";

}
function itemHelp(key){return (DAMAGE_ITEMS[key]||DAMAGE_ITEMS.none).help}
function abilityOptions(p,selected){
  const list=["なし",...(p.abilities||[])];
  return list.map(v=>`<option value="${v}" ${selected===v?"selected":""}>${v}</option>`).join("");
}
function isGrounded(p,ability,gravity,item="none"){return gravity||item==="ironBall"||(!p.types.map(typeKey).includes("Flying")&&ability!=="ふゆう")}
function typeMultiplierForDamage(moveType,defender,defAbility,gravity,defItem="none"){
  const atk=typeKey(moveType);
  if(atk==="Ground"&&defAbility==="ふゆう"&&!gravity&&defItem!=="ironBall")return 0;
  let m=1;
  defender.types.forEach(t=>{
    const dt=typeKey(t);
    if(atk==="Ground"&&dt==="Flying"&&(gravity||defItem==="ironBall"))m*=1;
    else m*=((TYPE_CHART[atk]||{})[dt]??1);
  });
  return m;
}
function offensiveAbilityMultiplier(ability,name,move,power){
  let m=1;
  if((ability==="ちからもち"||ability==="ヨガパワー")&&move.category==="物理")m*=2;
  if(ability==="テクニシャン"&&power<=60)m*=1.5;
  if((ability==="かたいツメ"||ability==="かたいツメ")&&CONTACT_NAMES.has(name))m*=1.3;
  if(ability==="てつのこぶし"&&(PUNCH_FLAG_MOVES.has(name)||PUNCH_MOVES_EXACT.has(name)))m*=1.2;
  if(ability==="がんじょうあご"&&(BITE_FLAG_MOVES.has(name)||BITE_MOVES_EXACT.has(name)))m*=1.5;
  if(ability==="メガランチャー"&&(PULSE_FLAG_MOVES.has(name)||PULSE_MOVES_EXACT.has(name)))m*=1.5;
  if(ability==="パンクロック"&&SOUND_MOVES.has(name))m*=1.3;
  return m;
}
function defensiveAbilityMultiplier(ability,moveType,effectiveness){
  const t=typeKey(moveType);
  if(ability==="あついしぼう"&&(t==="Fire"||t==="Ice"))return .5;
  if(["フィルター","ハードロック","プリズムアーマー"].includes(ability)&&effectiveness>1)return .75;
  return 1;
}
function abilityImmunity(ability,moveType){
  const t=typeKey(moveType);
  return (ability==="もらいび"&&t==="Fire")||(ability==="ちょすい"&&t==="Water")||(ability==="よびみず"&&t==="Water")||(ability==="ひらいしん"&&t==="Electric")||(ability==="そうしょく"&&t==="Grass");
}
function damageBaseStatsHtml(p){

}

function isMegaPokemon(p){return Boolean(p&&p.name.startsWith("メガ")&&p.name!=="メガニウム")}
function basePokemonForDamage(p){
  if(!isMegaPokemon(p))return p;
  let baseName=p.name.slice(2).replace(/ [XY]$/,"");
  return POKEMON.find(x=>!isMegaPokemon(x)&&x.name===baseName)
    ||POKEMON.find(x=>!isMegaPokemon(x)&&x.dex===p.dex)
    ||p;
}
function megaFormsForDamage(p){
  const base=basePokemonForDamage(p);
  return POKEMON.filter(x=>isMegaPokemon(x)&&x.dex===base.dex&&(
    x.name===`メガ${base.name}`||
    x.name===`メガ${base.name} X`||
    x.name===`メガ${base.name} Y`
  ));
}
function damagePokemonOptions(selectedPokemon){

}
function megaSwitchHtml(side,pokemon){

    `<button class="mega-switch-btn ${!isMegaPokemon(pokemon)?"active":""}" type="button" data-mega-side="${side}" data-mega-value="${base.name}">通常</button>`,
    ...forms.map(form=>{
      const label=form.name.endsWith(" X")?"メガX":form.name.endsWith(" Y")?"メガY":"メガ";

}
function damageMovesFor(pokemon){
  return sortMovesByType(pokemon.moves).filter(({info})=>info.category==="物理"||info.category==="特殊");
}


// ダメージ計算用：実機系の4096基準補正と段階丸め
function damageRound(value){return Math.max(0,Math.floor(Number(value)||0))}
function pokeRound(value){return Math.max(0,Math.floor((Number(value)||0)+0.5))}
function applyDamageMod(value,multiplier){
  const mod=Math.round(Number(multiplier||1)*4096);
  return Math.max(0,Math.floor((Math.max(0,Math.floor(value))*mod+2048)/4096));
}
function calcBaseDamage(power,attack,defense){
  if(!power)return 0;
  const levelPart=Math.floor((2*50)/5)+2;
  return Math.floor(Math.floor(Math.floor(levelPart*power*attack/Math.max(1,defense))/50)+2);
}
function displayedSpeed(p){return finalStat(p,"spe",0,"1.0")}
function variableMovePower(name,basePower,attacker,defender,hpBeforeAttack,hp,attackerItem,weather){
  let power=Number(basePower||0);
  if(name==="アクロバット"&&attackerItem==="none")power*=2;
  if(name==="からげんき"&&damageState.burn)power*=2;
  if(name==="しおみず"&&hpBeforeAttack*2<=hp)power*=2;
  if(name==="ウェザーボール"&&weather!=="none")power=100;
  if(name==="エレキボール"){
    const r=displayedSpeed(attacker)/Math.max(1,displayedSpeed(defender));
    power=r>=4?150:r>=3?120:r>=2?80:r>=1?60:40;
  }
  if(name==="ジャイロボール")power=Math.min(150,Math.max(1,Math.floor(25*displayedSpeed(defender)/Math.max(1,displayedSpeed(attacker)))+1));
  return Math.max(0,Math.floor(power));
}
function fixedDamageRolls(name,attacker,hpBeforeAttack){
  if(name==="ナイトヘッド"||name==="ちきゅうなげ")return Array(16).fill(50);
  if(name==="いかりのまえば"||name==="しぜんのいかり"||name==="カタストロフィ")return Array(16).fill(Math.max(1,Math.floor(hpBeforeAttack/2)));
  if(name==="いのちがけ")return Array(16).fill(baseFixedStat(attacker,"hp"));
  return null;
}
function twoHitKoChance(rolls,hp){
  if(hp<=0)return 100;
  let ko=0,total=0;
  for(const a of rolls)for(const b of rolls){total++;if(a+b>=hp)ko++;}
  return total?ko/total*100:0;
}

function damageCalcHtml(pagePokemon){
  if(!POKEMON.some(p=>p.name===damageState.attacker))damageState.attacker=pagePokemon.name;
  const attacker=POKEMON.find(p=>p.name===damageState.attacker)||pagePokemon;
  const damageMoveNames=damageMovesFor(attacker).map(x=>x.name);
  if(!damageState.move||!damageMoveNames.includes(damageState.move))damageState.move=damageMoveNames[0]||"";
  if(!POKEMON.some(p=>p.name===damageState.defender))damageState.defender=POKEMON[0]?.name||"";
  const defender=POKEMON.find(p=>p.name===damageState.defender)||POKEMON[0];
  if(!["なし",...(attacker.abilities||[])].includes(damageState.attackerAbility))damageState.attackerAbility=attacker.abilities?.[0]||"なし";
  if(!["なし",...(defender.abilities||[])].includes(damageState.defenderAbility))damageState.defenderAbility=defender.abilities?.[0]||"なし";
  const atkAllowed=["none","choiceBand","choiceSpecs","lifeOrb","muscleBand","wiseGlasses","expertBelt","typeBoost","lightBall","metronome"];
  const defAllowed=["none","resistBerry","ironBall"];
  if(!atkAllowed.includes(damageState.attackerItem))damageState.attackerItem="none";
  if(!defAllowed.includes(damageState.defenderItem))damageState.defenderItem="none";
  const move=moveMeta(damageState.move);
  const physical=move.category==="物理";
  let atkKey=physical?"atk":"spa",defKey=physical?"def":"spd";
  if(["サイコショック","サイコブレイク","しんぴのつるぎ"].includes(damageState.move))defKey="def";
  if(damageState.move==="ボディプレス")atkKey="def";
  if(damageState.move==="イカサマ")atkKey="atk";

  const selectedAtkRank=Number(damageState.atkBoost);
  const selectedDefRank=Number(damageState.defBoost);
  const effectiveAtkRank=damageState.critical&&selectedAtkRank<0?0:selectedAtkRank;
  const effectiveDefRank=damageState.critical&&selectedDefRank>0?0:selectedDefRank;
  const attackSource=damageState.move==="イカサマ"?defender:attacker;
  let atkValue=Math.floor(finalStat(attackSource,atkKey,damageState.atkPoints,damageState.atkCorrection)*rankMultiplier(effectiveAtkRank));
  let defValue=Math.max(1,Math.floor(finalStat(defender,defKey,damageState.defPoints,damageState.defCorrection)*rankMultiplier(effectiveDefRank)));
  const hp=finalStat(defender,"hp",damageState.defHpPoints,"none");

  if((physical||damageState.move==="ボディプレス"||damageState.move==="イカサマ")&&damageState.attackerItem==="choiceBand")atkValue=applyDamageMod(atkValue,1.5);
  if(!physical&&damageState.move!=="ボディプレス"&&damageState.move!=="イカサマ"&&damageState.attackerItem==="choiceSpecs")atkValue=applyDamageMod(atkValue,1.5);
  if(damageState.attackerItem==="lightBall"&&attacker.name==="ピカチュウ")atkValue=applyDamageMod(atkValue,2);
  if(damageState.weather==="sand"&&defKey==="spd"&&defender.types.map(typeKey).includes("Rock"))defValue=applyDamageMod(defValue,1.5);
  if(damageState.weather==="snow"&&defKey==="def"&&defender.types.map(typeKey).includes("Ice"))defValue=applyDamageMod(defValue,1.5);

  const attackerGrounded=isGrounded(attacker,damageState.attackerAbility,damageState.gravity,damageState.attackerItem);
  const defenderGrounded=isGrounded(defender,damageState.defenderAbility,damageState.gravity,damageState.defenderItem);
  const effectiveness=typeMultiplierForDamage(move.type,defender,damageState.defenderAbility,damageState.gravity,damageState.defenderItem);
  let stab=attacker.types.map(typeKey).includes(typeKey(move.type))?1.5:1;
  if(damageState.attackerAbility==="てきおうりょく"&&stab>1)stab=2;
  const immune=abilityImmunity(damageState.defenderAbility,move.type)||(damageState.terrain==="psychic"&&defenderGrounded&&Number(move.priority||0)>0);

  let entryDamage=0;
  if(damageState.stealthRock){
    const rockEff=typeMultiplierForDamage("いわ",defender,"なし",false,"none");
    entryDamage+=Math.floor(hp*rockEff/8);
  }
  const spikes=Number(damageState.spikes||0);
  if(spikes>0&&defenderGrounded)entryDamage+=Math.floor(hp*(spikes===1?1/8:spikes===2?1/6:1/4));
  entryDamage=Math.min(hp,entryDamage);
  const hpBeforeAttack=Math.max(0,hp-entryDamage);

  const power=variableMovePower(damageState.move,move.power,attacker,defender,hpBeforeAttack,hp,damageState.attackerItem,damageState.weather);
  const fixedRolls=fixedDamageRolls(damageState.move,attacker,hpBeforeAttack);
  let rolls;
  if(fixedRolls){
    rolls=immune?Array(16).fill(0):fixedRolls.map(x=>Math.min(hpBeforeAttack,x));
  }else if(!power||immune){
    rolls=Array(16).fill(0);
  }else{
    let base=calcBaseDamage(power,atkValue,defValue);
    // 実機系の適用順：全体技→天候→急所→乱数→タイプ一致→相性→やけど→その他最終補正
    if(damageState.spread)base=applyDamageMod(base,0.75);
    if(damageState.weather==="sun"&&typeKey(move.type)==="Fire")base=applyDamageMod(base,1.5);
    if(damageState.weather==="sun"&&typeKey(move.type)==="Water")base=applyDamageMod(base,0.5);
    if(damageState.weather==="rain"&&typeKey(move.type)==="Water")base=applyDamageMod(base,1.5);
    if(damageState.weather==="rain"&&typeKey(move.type)==="Fire")base=applyDamageMod(base,0.5);
    if(damageState.critical)base=applyDamageMod(base,damageState.attackerAbility==="スナイパー"?2.25:1.5);

    rolls=Array.from({length:16},(_,i)=>{
      let d=Math.floor(base*(85+i)/100);
      d=applyDamageMod(d,stab);
      d=applyDamageMod(d,effectiveness);
      const guts=damageState.attackerAbility==="こんじょう";
      if(damageState.burn&&physical&&!guts&&damageState.move!=="からげんき")d=applyDamageMod(d,0.5);
      if(attackerGrounded&&damageState.terrain==="electric"&&typeKey(move.type)==="Electric")d=applyDamageMod(d,1.3);
      if(attackerGrounded&&damageState.terrain==="psychic"&&typeKey(move.type)==="Psychic")d=applyDamageMod(d,1.3);
      if(attackerGrounded&&damageState.terrain==="grassy"&&typeKey(move.type)==="Grass")d=applyDamageMod(d,1.3);
      if(defenderGrounded&&damageState.terrain==="misty"&&typeKey(move.type)==="Dragon")d=applyDamageMod(d,0.5);
      if(defenderGrounded&&damageState.terrain==="grassy"&&["じしん","じならし","マグニチュード"].includes(damageState.move))d=applyDamageMod(d,0.5);
      if(damageState.helpingHand)d=applyDamageMod(d,1.5);
      if(damageState.reflect&&!damageState.critical)d=applyDamageMod(d,damageState.battleFormat==="double"?2/3:0.5);
      d=applyDamageMod(d,offensiveAbilityMultiplier(damageState.attackerAbility,damageState.move,move,power));
      d=applyDamageMod(d,defensiveAbilityMultiplier(damageState.defenderAbility,move.type,effectiveness));
      if(damageState.attackerItem==="lifeOrb")d=applyDamageMod(d,1.3);
      if(damageState.attackerItem==="muscleBand"&&physical)d=applyDamageMod(d,1.1);
      if(damageState.attackerItem==="wiseGlasses"&&!physical)d=applyDamageMod(d,1.1);
      if(damageState.attackerItem==="expertBelt"&&effectiveness>1)d=applyDamageMod(d,1.2);
      if(damageState.attackerItem==="typeBoost")d=applyDamageMod(d,1.2);
      if(damageState.defenderItem==="resistBerry"&&effectiveness>1)d=applyDamageMod(d,0.5);
      return Math.max(1,d);
    });
  }

  const min=Math.min(...rolls),max=Math.max(...rolls),minPct=hp?min/hp*100:0,maxPct=hp?max/hp*100:0;
  const remainWorst=Math.max(0,hpBeforeAttack-max),remainBest=Math.max(0,hpBeforeAttack-min);
  const remainWorstPct=hp?remainWorst/hp*100:0,remainBestPct=hp?remainBest/hp*100:0;
  const oneHitChance=rolls.filter(x=>x>=hpBeforeAttack).length/16*100;
  const twoHitChance=twoHitKoChance(rolls,hpBeforeAttack);
  const ko=max===0?"ダメージなし":min>=hpBeforeAttack?"確定1発":max>=hpBeforeAttack?`乱数1発（${oneHitChance.toFixed(1)}%）`:twoHitChance>=100?"確定2発":twoHitChance>0?`乱数2発（${twoHitChance.toFixed(1)}%）`:"確定3発以上";
  const typeText=effectiveness===0?"無効":effectiveness===.25?"0.25倍":effectiveness===.5?"0.5倍":effectiveness===2?"2倍":effectiveness===4?"4倍":"等倍";
  const weatherHelp={none:"天候補正なし",sun:"ほのお技1.5倍／みず技0.5倍",rain:"みず技1.5倍／ほのお技0.5倍",sand:"いわタイプの特防1.5倍",snow:"こおりタイプの防御1.5倍"}[damageState.weather];
  const gaugeClass=remainWorstPct<=20?"hp-red":remainWorstPct<=50?"hp-yellow":"";
  const entryText=entryDamage?`場のダメージ：${entryDamage}（攻撃前HP ${hpBeforeAttack}/${hp}）`:`攻撃前HP：${hp}/${hp}`;
  return `<section class="damage-calculator">
    <div class="damage-columns">
      <div class="damage-card"><h2>攻撃側</h2>
        <div class="damage-side-head">
          ${damageBaseStatsHtml(attacker)}
          <div class="damage-field"><label>ポケモン</label><div class="pokemon-select-wrap"><select data-damage="attacker">${damagePokemonOptions(attacker)}</select>${pokemonTypeBadges(attacker)}</div></div>
          ${megaSwitchHtml("attacker",attacker)}
        </div>
        <div class="damage-field"><label>使用する技</label><div class="move-select-wrap">${damageMovePickerHtml(attacker,damageState.move)}</div></div>
        <div class="damage-field"><label>特性</label><select data-damage="attackerAbility">${abilityOptions(attacker,damageState.attackerAbility)}</select></div>
        <div class="damage-field"><label>持ち物</label><select data-damage="attackerItem">${itemOptions(damageState.attackerItem,"atk")}</select></div><div class="item-help">${itemHelp(damageState.attackerItem)}</div>
        <div class="damage-field"><label>能力ポイント</label><div><input data-damage="atkPoints" type="range" min="0" max="32" value="${damageState.atkPoints}"><div class="range-value">${damageState.atkPoints} / 32</div></div></div>
        <div class="damage-field"><label>能力補正</label>${correctionChoiceHtml("atkCorrection",damageState.atkCorrection)}</div>
        <div class="damage-field"><label>能力ランク</label>${rankChoiceHtml("atkBoost",damageState.atkBoost)}</div>
        <div class="point-total">${physical?"攻撃":"特攻"}：${atkValue}</div>
      </div>
      <div class="damage-card"><h2>防御側</h2>
        <div class="damage-side-head">
          ${damageBaseStatsHtml(defender)}
          <div class="damage-field"><label>ポケモン</label><div class="pokemon-select-wrap"><select data-damage="defender">${damagePokemonOptions(defender)}</select>${pokemonTypeBadges(defender)}</div></div>
          ${megaSwitchHtml("defender",defender)}
        </div>
        <div class="damage-field"><label>特性</label><select data-damage="defenderAbility">${abilityOptions(defender,damageState.defenderAbility)}</select></div>
        <div class="damage-field"><label>持ち物</label><select data-damage="defenderItem">${itemOptions(damageState.defenderItem,"def")}</select></div><div class="item-help">${itemHelp(damageState.defenderItem)}</div>
        <div class="point-grid">
          <div class="point-item"><label><span>HP</span><span>0～32</span></label><input data-damage="defHpPoints" type="range" min="0" max="32" value="${damageState.defHpPoints}"><div class="range-value">${damageState.defHpPoints} / 32</div></div>
          <div class="point-item"><label><span>${physical?"防御":"特防"}</span><span>0～32</span></label><input data-damage="defPoints" type="range" min="0" max="32" value="${damageState.defPoints}"><div class="range-value">${damageState.defPoints} / 32</div></div>
        </div>
        <div class="damage-field"><label>能力補正</label>${correctionChoiceHtml("defCorrection",damageState.defCorrection)}</div>
        <div class="damage-field"><label>能力ランク</label>${rankChoiceHtml("defBoost",damageState.defBoost)}</div>

      <div class="damage-section-label">バトル形式</div><div class="choice-row">
        ${[["single","シングル"],["double","ダブル"]].map(([v,l])=>`<label class="choice-pill"><input data-damage="battleFormat" type="radio" name="damage-battle-format" value="${v}" ${damageState.battleFormat===v?"checked":""}>${l}</label>`).join("")}
      </div><div class="choice-help">壁の補正：シングルは0.5倍、ダブルは約0.67倍。</div>
      <div class="damage-section-label">天候</div><div class="choice-row">
        ${[["none","なし"],["sun","はれ"],["rain","あめ"],["sand","すな"],["snow","ゆき"]].map(([v,l])=>`<label class="choice-pill"><input data-damage="weather" type="radio" name="damage-weather" value="${v}" ${damageState.weather===v?"checked":""}>${l}</label>`).join("")}
      </div><div class="choice-help">${weatherHelp}</div>
      <div class="damage-section-label">フィールド</div><div class="choice-row">
        ${[["none","なし"],["electric","エレキ"],["psychic","サイコ"],["grassy","グラス"],["misty","ミスト"]].map(([v,l])=>`<label class="choice-pill"><input data-damage="terrain" type="radio" name="damage-terrain" value="${v}" ${damageState.terrain===v?"checked":""}>${l}</label>`).join("")}
      </div>
      <div class="damage-section-label">設置技</div>
      <div class="damage-options"><label class="damage-check"><input data-damage="stealthRock" type="checkbox" ${damageState.stealthRock?"checked":""}>ステルスロック</label></div>
      <div class="damage-section-label">まきびし</div><div class="choice-row">
        ${[["0","なし"],["1","1回（1/8）"],["2","2回（1/6）"],["3","3回（1/4）"]].map(([v,l])=>`<label class="choice-pill"><input data-damage="spikes" type="radio" name="damage-spikes" value="${v}" ${Number(damageState.spikes)===Number(v)?"checked":""}>${l}</label>`).join("")}
      </div>
      <div class="damage-section-label">その他</div><div class="damage-options">
        <label class="damage-check"><input data-damage="gravity" type="checkbox" ${damageState.gravity?"checked":""}>じゅうりょく</label>
        <label class="damage-check"><input data-damage="critical" type="checkbox" ${damageState.critical?"checked":""}>急所（1.5倍${damageState.attackerAbility==="スナイパー"?"／スナイパー時2.25倍":""}）</label>
        <label class="damage-check"><input data-damage="helpingHand" type="checkbox" ${damageState.helpingHand?"checked":""}>てだすけ</label>
        <label class="damage-check"><input data-damage="spread" type="checkbox" ${damageState.spread?"checked":""}>全体技補正（0.75倍）</label>
        <label class="damage-check"><input data-damage="reflect" type="checkbox" ${damageState.reflect?"checked":""}>${physical?"リフレクター":"ひかりのかべ"}</label>
        <label class="damage-check"><input data-damage="burn" type="checkbox" ${damageState.burn?"checked":""}>やけど（物理技0.5倍）</label>
      </div><div class="choice-help">じゅうりょく／くろいてっきゅう：ひこうタイプ・特性「ふゆう」にも、じめんタイプの技が当たります。<br>急所：通常1.5倍。特性「スナイパー」では2.25倍。攻撃側の攻撃・特攻ダウン、防御側の防御・特防アップ、リフレクター・ひかりのかべを無視します。やけどによる物理技半減は無視しません。</div>
    </div>
    <div class="damage-result">
      <div class="damage-result-main">${damageState.move}：与ダメージ量 ${min}～${max}</div>
      <div class="damage-result-grid">
        <div class="damage-result-cell"><span class="label">与ダメージ割合</span><strong>${minPct.toFixed(1)}～${maxPct.toFixed(1)}%</strong></div>
        <div class="damage-result-cell"><span class="label">判定</span><strong>${ko}</strong></div>
        <div class="damage-result-cell"><span class="label">タイプ相性</span><strong>${typeText}</strong></div>
        <div class="damage-result-cell"><span class="label">攻撃前HP</span><strong>${hpBeforeAttack}/${hp}</strong></div>
      </div>
      <div class="hp-gauge"><div class="hp-gauge-fill ${gaugeClass}" style="width:${Math.max(0,Math.min(100,remainWorstPct))}%"></div><div class="hp-gauge-text">与ダメージ量 ${min}～${max} ／ 与ダメージ割合 ${minPct.toFixed(1)}～${maxPct.toFixed(1)}%</div></div>
      <div class="damage-note">${entryText}<br>乱数：${rolls.join(", ")}<br>${damageState.critical?`急所補正：${damageState.attackerAbility==="スナイパー"?"2.25倍（スナイパー）":"1.5倍"}。攻撃側のマイナス能力ランク、防御側のプラス能力ランク、壁を無視。<br>`:""}能力ポイントは各能力0～32。補正は実機系の順序で段階的に丸めます。固定ダメージ技、特殊参照技、主要な威力変動技、16×16通りの2発撃破率を反映します。</div>
    </div>
  </section>`;
}
function bindDamageControls(){
  detailEl.querySelectorAll("[data-damage]").forEach(el=>el.addEventListener("change",()=>{
    const k=el.dataset.damage;
    if(el.type==="checkbox")damageState[k]=el.checked;
    else if(el.type==="number"||el.type==="range")damageState[k]=Math.max(0,Math.min(32,Number(el.value)||0));
    else damageState[k]=el.value;
    renderDetail();
  }));
  detailEl.querySelectorAll("[data-mega-side]").forEach(button=>button.addEventListener("click",()=>{
    const side=button.dataset.megaSide;
    damageState[side]=button.dataset.megaValue;
    if(side==="attacker")damageState.move="";
    renderDetail();
  }));
  const pickerToggle=detailEl.querySelector("[data-move-picker-toggle]");
  const pickerMenu=detailEl.querySelector("[data-move-picker-menu]");
  if(pickerToggle&&pickerMenu){
    pickerToggle.addEventListener("click",()=>{
      const open=pickerMenu.hidden;
      pickerMenu.hidden=!open;
      pickerToggle.setAttribute("aria-expanded",String(open));
    });
    pickerMenu.querySelectorAll("[data-move-value]").forEach(button=>button.addEventListener("click",()=>{
      damageState.move=button.dataset.moveValue;
      renderDetail();
    }));
  }
}

function renderDetail(){
  const p=POKEMON.find(x=>x.name===selected)||POKEMON[0];if(!p)return;
  if(viewMode==="damage"){
    detailEl.innerHTML=`<div class="head"><div><h2 class="name">ダメージ計算</h2><div class="help">攻撃側・防御側のポケモンを自由に選択できます。</div></div><button id="damageBackButton" class="list-toggle" type="button">ポケモン検索へ戻る</button></div>${damageCalcHtml(p)}<div class="footer">ポケモン検索とは独立したダメージ計算専用ページです。攻撃側・防御側の基礎能力値を選択欄の横で確認できます。</div>`;
    document.getElementById("damageBackButton")?.addEventListener("click",()=>{viewMode="database";render()});
    bindDamageControls();
    return;
  }
  const shown=p.moves;
  const sortedMoves=sortMovesByType(shown);
  detailEl.innerHTML=`<div class="head"><div><h2 class="name">${p.name}</h2><div class="chips">${p.types.map(t=>typeBadge(t,"chip")).join("")}</div></div><span class="dex">No.${p.dex}</span></div>
  <div class="detail-tabs" role="tablist" aria-label="ポケモン詳細の表示切り替え">
    <button class="detail-tab ${activeDetailTab==="overview"?"active":""}" type="button" role="tab" aria-selected="${activeDetailTab==="overview"}" data-tab="overview">基本情報</button>
    <button class="detail-tab ${activeDetailTab==="moves"?"active":""}" type="button" role="tab" aria-selected="${activeDetailTab==="moves"}" data-tab="moves">覚える技</button>
    <button class="detail-tab ${activeDetailTab==="builds"?"active":""}" type="button" role="tab" aria-selected="${activeDetailTab==="builds"}" data-tab="builds">育成論</button>
  </div>
  <div class="detail-tab-panel ${activeDetailTab==="overview"?"active":""}" data-panel="overview">
    <div class="overview-dashboard">
      <div class="overview-main">
        ${matchupHtml(p.types)}
        <section class="section"><h2>基礎能力値</h2><div class="stats">${Object.entries(p.stats).map(([k,v])=>`<div class="stat"><div class="label">${statLabels[k]}</div><div class="value">${p.name==="ヌケニン"&&k==="hp"?1:v+(k==="hp"?75:20)}</div></div>`).join("")}</div></section>
      </div>
      <div class="overview-side">
        <section class="section"><h2>素早さ（こだわりスカーフ持ち時）</h2><div class="speed-grid">${speeds(p.stats.spe).map(([l,v])=>`<div class="speed"><div class="label">${l}</div><div class="value">${v}（${Math.floor(v*1.5)}）</div></div>`).join("")}</div></section>
        <section class="section abilities-section"><h2>特性</h2><div class="abilities">${p.abilities.map(a=>`
          <div class="ability-item"><div class="ability-button"><span class="ability-name">${a}</span></div><div class="ability-detail">${renderAbilityInfo(a)}</div></div>`).join("")}</div></section>
      </div>
    </div>
  </div>
  <div class="detail-tab-panel ${activeDetailTab==="moves"?"active":""}" data-panel="moves">
    <section class="section"><div class="moves-head"><div><h2 style="margin:0">使用可能な技</h2><div class="help">全 ${p.moves.length} 技</div></div></div>
    <div class="move-groups">${moveListHtml(sortedMoves)}</div></section>
  </div>
  <div class="detail-tab-panel ${activeDetailTab==="builds"?"active":""}" data-panel="builds">
    <section class="build-guide"><h2>育成論</h2><p>このポケモンの想定型を掲載するためのタブです。今後、役割・能力補正・持ち物・技構成・能力ポイント調整・立ち回りなどを追加できます。</p>
      <div class="build-placeholder-grid"><div class="build-placeholder"><strong>基本型</strong><span class="help">能力補正、持ち物、技構成、能力ポイント調整</span></div><div class="build-placeholder"><strong>役割・立ち回り</strong><span class="help">選出基準、得意な相手、苦手な相手</span></div></div>
    </section>
  </div>
  <div class="footer">収録フォーム数：${POKEMON.length}／使用可能技：${p.moves.length}。上部タブで基本情報・覚える技・育成論を切り替えられます。</div>`;
  detailEl.querySelectorAll(".detail-tab").forEach(tab=>tab.addEventListener("click",()=>{activeDetailTab=tab.dataset.tab;renderDetail()}));
}
function setListOpen(open){listOpen=Boolean(open);listEl.hidden=!listOpen;layoutEl.classList.toggle("list-open",listOpen);listToggleEl.setAttribute("aria-expanded",String(listOpen));listToggleEl.textContent=listOpen?"ポケモン一覧を閉じる":"ポケモン一覧を表示"}
function updateViewControls(){
  const damageMode=viewMode==="damage";
  searchEl.hidden=damageMode;
  listToggleEl.hidden=damageMode;
  damagePageToggleEl.textContent=damageMode?"ポケモン検索へ戻る":"ダメージ計算";
  damagePageToggleEl.classList.toggle("active",damageMode);
  if(damageMode)setListOpen(false);
}
function render(){updateViewControls();if(viewMode==="database")renderList();renderDetail()}
searchEl.addEventListener("input",e=>{query=e.target.value;render()});
listToggleEl.addEventListener("click",()=>{setListOpen(!listOpen);if(listOpen){renderList();if(innerWidth<801)listEl.scrollIntoView({behavior:"smooth",block:"nearest"})}});
damagePageToggleEl.addEventListener("click",()=>{viewMode=viewMode==="damage"?"database":"damage";render();detailEl.scrollIntoView({behavior:"smooth",block:"start"})});
setListOpen(false);render();
</script></body></html>

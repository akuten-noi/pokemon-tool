<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="Pokémon Champions専用の日本語対戦データベース">
<title>ポケモンチャンピオンズ 対戦データベース</title>
<style>
:root{--bg:#f5f7fb;--panel:#fff;--text:#172033;--muted:#667085;--line:#d9dfeb;--accent:#2f67d8;--soft:#eaf1ff}
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI","Noto Sans JP",sans-serif}
button,input,select{font:inherit} .app{max-width:1180px;margin:auto;padding:16px} h1{margin:0;font-size:clamp(1.35rem,3vw,2rem)}
.controls{position:sticky;top:0;z-index:5;display:grid;grid-template-columns:1fr 180px;gap:8px;padding:8px 0 12px;background:rgba(245,247,251,.96);backdrop-filter:blur(8px)}
input,select{width:100%;padding:12px;border:1px solid var(--line);border-radius:12px;background:#fff;color:var(--text)}
.layout{display:grid;grid-template-columns:300px minmax(0,1fr);gap:16px} .sidebar,.detail{border:1px solid var(--line);border-radius:16px;background:var(--panel)}
.sidebar{padding:8px;max-height:calc(100vh - 150px);overflow:auto} .mon-btn{width:100%;border:0;background:transparent;padding:10px 11px;border-radius:10px;display:flex;justify-content:space-between;gap:8px;text-align:left;color:var(--text);cursor:pointer}
.mon-btn:hover,.mon-btn.active{background:var(--soft)} .dex{color:var(--muted);font-size:.8rem;white-space:nowrap} .detail{padding:18px;min-width:0}
.head{display:flex;justify-content:space-between;gap:12px} .name{margin:0;font-size:1.65rem} .chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.chip{border:1px solid var(--line);border-radius:999px;padding:3px 9px;background:#fafbfc;font-size:.82rem} .section{margin-top:22px} .section h2{margin:0 0 10px;font-size:1rem}
.stats{display:grid;grid-template-columns:repeat(6,1fr);gap:7px} .stat.total{grid-column:1/-1} .stat,.speed,.ability{border:1px solid var(--line);border-radius:11px;padding:10px;background:#fbfcfe}
.stat{text-align:center} .label{color:var(--muted);font-size:.76rem} .value{font-weight:750;font-size:1.15rem} .speed-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.speed{text-align:center} .speed:first-child{background:var(--soft);border-color:#b9cdf8} .help{color:var(--muted);font-size:.82rem;margin:0 0 8px}
.abilities{display:grid;grid-template-columns:repeat(3,1fr);gap:7px} .moves-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:9px}
.move-search{max-width:280px;padding:9px 11px} .move-groups{display:grid;grid-template-columns:repeat(3,1fr);gap:10px} .move-group{border:1px solid var(--line);border-radius:12px;overflow:hidden}
.move-group h3{margin:0;padding:9px 11px;background:#f2f5fa;font-size:.9rem;border-bottom:1px solid var(--line)} .move-list{list-style:none;margin:0;padding:0}
.move-list li{padding:8px 11px;border-bottom:1px solid #edf0f5;font-size:.9rem} .move-list li:last-child{border-bottom:0} .empty{color:var(--muted);padding:25px;text-align:center}
.footer{color:var(--muted);font-size:.8rem;margin-top:22px;padding-top:12px;border-top:1px solid var(--line)}
@media(max-width:800px){.controls{grid-template-columns:1fr}.layout{grid-template-columns:1fr}.sidebar{max-height:220px}.stats{grid-template-columns:repeat(3,1fr)}.speed-grid{grid-template-columns:repeat(2,1fr)}.abilities{grid-template-columns:1fr}.move-groups{grid-template-columns:1fr}}

.move-groups{display:grid!important;grid-template-columns:1fr!important;gap:14px}
.move-group{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:#fff}
.move-group h3{margin:0;padding:11px 13px;background:#f2f5fa;font-size:1rem;border-bottom:1px solid var(--line);display:flex;justify-content:space-between}
.move-list{list-style:none;margin:0;padding:0}
.move-item{border-bottom:1px solid #edf0f5}.move-item:last-child{border-bottom:0}
.move-button{width:100%;border:0;background:#fff;color:var(--text);padding:11px 13px;display:flex;justify-content:space-between;align-items:center;text-align:left;cursor:pointer}
.move-button:hover{background:#f8faff}.move-name{font-weight:700}
.move-type{font-size:.78rem;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:2px 8px}
.move-detail{display:none;padding:0 13px 12px;background:#fbfcfe}.move-item.open .move-detail{display:block}
.move-specs{display:grid;grid-template-columns:repeat(6,1fr);gap:7px}
.move-spec{border:1px solid var(--line);border-radius:9px;padding:8px;text-align:center;background:#fff}
@media(max-width:800px){.move-specs{grid-template-columns:repeat(2,1fr)}}


.ability-item{
  border:1px solid var(--line);
  border-radius:11px;
  overflow:hidden;
  background:#fbfcfe
}
.ability-button{
  width:100%;
  border:0;
  background:transparent;
  color:var(--text);
  padding:11px 12px;
  text-align:left;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px
}
.ability-button:hover{background:#f5f8ff}
.ability-name{font-weight:750}
.ability-toggle{color:var(--muted);font-size:.82rem;white-space:nowrap}
.ability-detail{
  display:none;
  padding:0 12px 12px;
  color:var(--text);
  line-height:1.7;
  font-size:.9rem
}
.ability-item.open .ability-detail{display:block}


/* タイプカラーとタイプ相性 */
.chip,.type-badge{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:66px;padding:4px 12px;border-radius:9999px;
  font-size:.82rem;font-weight:800;line-height:1.25;
  color:#fff;border:1px solid rgba(0,0,0,.08);
  box-shadow:inset 0 -1px 0 rgba(0,0,0,.12);
  white-space:nowrap
}
.chips,.type-badges{display:flex;flex-wrap:wrap;gap:7px}
.type-Normal{background:#A8A878}.type-Fire{background:#F08030}.type-Water{background:#6890F0}.type-Electric{background:#F8D030;color:#342f14}.type-Grass{background:#78C850}.type-Ice{background:#98D8D8;color:#263c3c}.type-Fighting{background:#C03028}.type-Poison{background:#A040A0}.type-Ground{background:#E0C068;color:#3d3420}.type-Flying{background:#A890F0}.type-Psychic{background:#F85888}.type-Bug{background:#A8B820}.type-Rock{background:#B8A038}.type-Ghost{background:#705898}.type-Dragon{background:#7038F8}.type-Dark{background:#705848}.type-Steel{background:#B8B8D0;color:#292936}.type-Fairy{background:#EE99AC;color:#42242b}
.matchup-section{margin-top:14px;padding:14px 16px;background:#f8faff;border:1px solid var(--line);border-radius:14px}
.matchup-title{margin:0 0 10px;font-size:1rem}
.matchup-grid{display:grid;gap:9px}
.matchup-row{display:grid;grid-template-columns:72px 1fr;align-items:start;gap:9px}
.matchup-label{font-weight:850;font-size:.84rem;padding-top:5px}
.matchup-label.x4,.matchup-label.x2{color:#c72b2b}.matchup-label.x05,.matchup-label.x025{color:#18794e}.matchup-label.x0{color:#49566c}
.matchup-note{margin:9px 0 0;color:var(--muted);font-size:.76rem}
.move-type.type-badge{min-width:58px;padding:2px 9px;font-size:.72rem;color:#fff;border:none}
.move-type.type-Electric,.move-type.type-Ice,.move-type.type-Ground,.move-type.type-Steel,.move-type.type-Fairy{color:#292936}
@media(max-width:520px){.matchup-row{grid-template-columns:58px 1fr}.chip,.type-badge{min-width:58px;padding:4px 9px}}


.move-extra{margin-top:12px;display:grid;gap:10px}.move-extra-row{background:#f7f9fc;border:1px solid #e3e8f0;border-radius:10px;padding:10px 12px}.move-extra-label{font-size:.78rem;font-weight:800;color:#5b6574;margin-bottom:5px}.move-extra-text{line-height:1.65;color:#202631}.move-tags{display:flex;flex-wrap:wrap;gap:6px}.move-tag{display:inline-flex;align-items:center;min-height:24px;padding:2px 10px;border-radius:999px;background:#e9edf3;border:1px solid #d4dae4;color:#303744;font-size:.78rem;font-weight:800;white-space:nowrap}.move-tag.important{background:#fff4d8;border-color:#efd28a;color:#664b00}.move-tag.ability{background:#e9f3ff;border-color:#bad6f5;color:#164e86}.move-note{font-size:.75rem;color:#6b7280;margin-top:8px;line-height:1.5}
.move-tag.defense{border-color:#8b5cf6;background:rgba(139,92,246,.12)}
.move-category{display:inline-flex;align-items:center;justify-content:center;min-width:48px;padding:2px 8px;border-radius:999px;background:#eef1f5;border:1px solid #d8dde5;color:#303744;font-size:.72rem;font-weight:800;line-height:1.25;white-space:nowrap}.move-button{justify-content:flex-start;gap:8px}.move-name{flex:0 0 13em;min-width:0;font-weight:700}.move-button .move-type{margin-left:0}.move-group.all-moves h3{justify-content:space-between}@media(max-width:600px){.move-name{flex-basis:9.5em}.move-button{gap:6px;padding-left:10px;padding-right:10px}.move-category{min-width:44px;padding-left:6px;padding-right:6px}.move-type.type-badge{min-width:52px;padding-left:7px;padding-right:7px}}

.ability-info-block{display:grid;gap:12px}
.ability-info-section{display:grid;gap:5px}
.ability-info-heading{font-size:.78rem;font-weight:850;color:#4b5563;letter-spacing:.02em}
.ability-info-body{line-height:1.72;color:#202631}
.ability-info-list{margin:0;padding-left:1.25rem;display:grid;gap:4px}

</style>
</head>

function hiraToKata(v){return String(v||"").replace(/[ぁ-ゖ]/g,ch=>String.fromCharCode(ch.charCodeAt(0)+0x60))}
function norm(v){return hiraToKata(String(v||"").normalize("NFKC").toLowerCase()).replace(/[\s・ー_\-（）()]/g,"")}
function searchable(p){return p.name}
function filtered(){
  const q=norm(query);
  const mons=POKEMON.filter(p=>(!typeFilter||p.types.includes(typeFilter))&&(!q||norm(p.name).includes(q)));
  if(!q)return mons;
  return mons.map((p,index)=>{
    const name=norm(p.name);
    const isMega=p.name.startsWith("メガ");
    const rank=(!isMega&&name.startsWith(q))?0:(isMega&&name.startsWith(q))?2:1;
    return {p,index,rank};
  }).sort((a,b)=>a.rank-b.rank||a.index-b.index).map(x=>x.p);
}
function calcSpeed(base,ev,nature){const raw=Math.floor(((2*base+31+Math.floor(ev/4))*50)/100)+5;return Math.floor(raw*nature)}
function speeds(base){return [["最速",calcSpeed(base,252,1.1)],["準速",calcSpeed(base,252,1)],["無振り",calcSpeed(base,0,1)],["最遅",calcSpeed(base,0,.9)]]}
function renderList(){const mons=filtered();if(!mons.length){listEl.innerHTML='<div class="empty">該当するポケモンがいません</div>';detailEl.innerHTML='<div class="empty">検索条件を変更してください。</div>';return}if(!mons.some(p=>p.name===selected))selected=mons[0].name;listEl.innerHTML=mons.map(p=>`<button class="mon-btn ${p.name===selected?"active":""}" data-name="${p.name}"><span>${p.name}</span><span class="dex">No.${p.dex}</span></button>`).join("");listEl.querySelectorAll(".mon-btn").forEach(b=>b.addEventListener("click",()=>{selected=b.dataset.name;moveQuery="";render();if(innerWidth<801)detailEl.scrollIntoView({behavior:"smooth"})}))}

const SPREAD_MOVES_COMPLETE=new Set(["じしん", "なみのり", "ほうでん", "ねっぷう", "いわなだれ", "ハイパーボイス", "ばくおんぱ", "だくりゅう", "しおふき", "マジカルシャイン", "こごえるかぜ", "エレキネット", "じならし", "ふぶき", "ワイドフォース", "ゴールドラッシュ", "ミストバースト", "だいばくはつ", "じばく"]);

/* 技分類タグは部分一致ではなく、対象技の固定リストで判定する */
const CUTTING_MOVES=new Set(["いあいぎり","エアカッター","エアスラッシュ","アクアカッター","がんせきアックス","クロスポイズン","サイコカッター","シェルブレード","シザークロス","せいなるつるぎ","ソーラーブレード","タキオンカッター","つじぎり","つばめがえし","ネズミざん","ひけん・ちえなみ","むねんのつるぎ","リーフブレード","れんぞくぎり"]);
const PUNCH_MOVES_EXACT=new Set(["アイスハンマー","アームハンマー","かみなりパンチ","きあいパンチ","コメットパンチ","ジェットパンチ","シャドーパンチ","スカイアッパー","ドレインパンチ","ばくれつパンチ","バレットパンチ","ピヨピヨパンチ","ほのおのパンチ","マッハパンチ","メガトンパンチ","れいとうパンチ","れんぞくパンチ"]);
const BITE_MOVES_EXACT=new Set(["エラがみ","かみくだく","かみつく","かみなりのキバ","くらいつく","こおりのキバ","サイコファング","どくどくのキバ","ほのおのキバ"]);
const PULSE_MOVES_EXACT=new Set(["あくのはどう","いやしのはどう","こんげんのはどう","だいちのはどう","はどうだん","みずのはどう","りゅうのはどう"]);
const BALL_MOVES_EXACT=new Set(["アシッドボム","ウェザーボール","エナジーボール","エレキボール","オクタンほう","かふんだんご","がんせきほう","きあいだま","ジャイロボール","シャドーボール","タネばくだん","タネマシンガン","たまなげ","でんじほう","どろばくだん","はどうだん","ヘドロばくだん","ミストボール","ロックブラスト"]);

/* 命中判定を行わない技。命中欄だけでなく「効果・追加効果」にも必中と表示する */
const ALWAYS_HIT_MOVES=new Set(["あてみなげ","いじげんホール","いじげんラッシュ","クリアスモッグ","シャドーパンチ","スピードスター","スマートホーン","だましうち","つばめがえし","でんげきは","トリックフラワー","ドゲザン","タキオンカッター","はどうだん","マジカルリーフ"]);

/* 技の威力を上げる特性との対応を、技タグだけでなく効果欄にも表示する */
const POWER_ABILITY_NOTES=[
 {test:n=>PUNCH_MOVES_EXACT.has(n),text:"特性『てつのこぶし』の対象で、威力が1.2倍になる。"},
 {test:n=>BITE_MOVES_EXACT.has(n),text:"特性『がんじょうあご』の対象で、威力が1.5倍になる。"},
 {test:n=>CUTTING_MOVES.has(n),text:"特性『きれあじ』の対象で、威力が1.5倍になる。"},
 {test:n=>PULSE_MOVES_EXACT.has(n),text:"特性『メガランチャー』の対象で、攻撃技の威力が1.5倍になる。"},
 {test:n=>SOUND_MOVES.has(n),text:"特性『パンクロック』の対象で、攻撃技の威力が1.3倍になる。"}
];

const SOUND_MOVES=new Set(["いびき","うたう","いやしのすず","エコーボイス","おしゃべり","きんぞくおん","さわぐ","すてゼリフ","ソウルビート","チャームボイス","ないしょばなし","バークアウト","ばくおんぱ","ハイパーボイス","ほえる","ほろびのうた","むしのさざめき","りんしょう","うたかたのアリア","ブレイジングソウルビート","フレアソング","サイコノイズ","みわくのボイス","スケイルノイズ","オーバードライブ"]);
const CONTACT_EXCEPTIONS=new Set(["じしん","じならし","いわなだれ","ストーンエッジ","タネばくだん","タネマシンガン","ロックブラスト","ミサイルばり","ダストシュート","ヘドロウェーブ","アクアジェット","ウェーブタックル"]);
const CONTACT_NAMES=new Set(["アイアンヘッド","アクアブレイク","アクアテール","インファイト","かみくだく","かみつく","かわらわり","きゅうけつ","クロスポイズン","シザークロス","しねんのずつき","すてみタックル","たきのぼり","つばめがえし","つららおとし","とびかかる","とびつく","とんぼがえり","どくづき","ドレインパンチ","ドラゴンクロー","ドラゴンダイブ","ドラゴンテール","ニトロチャージ","ねこだまし","はたきおとす","ふいうち","ブレイブバード","フレアドライブ","ボルテッカー","ワイルドボルト","じゃれつく","アイススピナー","グラススライダー","クイックターン","ジェットパンチ","アクセルブレイク","きょけんとつげき","ドゲザン","デカハンマー","むねんのつるぎ"]);
const BALL_BOMB_RE=/(ボール|ボム|ばくだん|だんご|キャノン|ショット|ブラスト|ほう$)/;
const SLASH_RE=/(きり|斬|カッター|ブレード|つるぎ|エッジ|クロス|クロー|シザークロス|つじぎり|せいなるつるぎ|リーフブレード)/;
const BITE_RE=/(かみつく|かみくだく|キバ|サイコファング|エラがみ)/;
const PUNCH_RE=/(パンチ|こぶし|アームハンマー|ばくれつパンチ|マッハパンチ)/;
const PULSE_RE=/(はどう|波動|オーラ)/;
const WIND_RE=/(かぜ|ぼうふう|おいかぜ|ねっぷう|こがらし|あらし|ふぶき|エアカッター)/;
const DANCE_RE=/(まい$|ダンス|ステップ|フラフラダンス|しょうりのまい)/;
const POWDER_RE=/(こな|ほうし)/;
function defaultTarget(info){if(info.category==="変化")return "技による";return "1体選択"}
function inferredTags(name,info){
 const tags=[];
 if(CONTACT_NAMES.has(name))tags.push("接触");
 if(SOUND_MOVES.has(name))tags.push("音技","みがわり貫通","ぼうおん対象","パンクロック対象");
 if(PUNCH_MOVES_EXACT.has(name))tags.push("パンチ技","てつのこぶし対象");
 if(BITE_MOVES_EXACT.has(name))tags.push("かみつき技","がんじょうあご対象");
 if(CUTTING_MOVES.has(name))tags.push("斬撃技","きれあじ対象");
 if(PULSE_MOVES_EXACT.has(name))tags.push("波動技","メガランチャー対象");
 if(BALL_MOVES_EXACT.has(name))tags.push("弾技","ぼうだん対象");
 if(WIND_RE.test(name))tags.push("風技");
 if(DANCE_RE.test(name))tags.push("ダンス技");
 if(POWDER_RE.test(name))tags.push("粉技");
 if(info.priority>0)tags.push("優先技");
 if(info.priority!==0)tags.push(`優先度${info.priority>0?"+":""}${info.priority}`);
 if(DOUBLE_ONLY_MOVES.has(name))tags.push("ダブル専用");
 if(SPREAD_MOVES_COMPLETE.has(name))tags.push("複数対象技","ダブル向け");
 return [...new Set(tags)];
}
function normalizeMoveEffectText(text){
 if(!text) return "";
 let out=text.trim();
 // 威力・分類から自明な説明は削除し、固有効果だけを残す。
 out=out.replace(/^相手に大ダメージを与える。\s*/,"");
 out=out.replace(/^相手にダメージを与える。\s*/,"");
 out=out.replace(/^相手にダメージを与え、/,"");
 out=out.replace(/^通常攻撃。追加効果はない。\s*/,"");
 out=out.replace(/^通常攻撃。/,"");
 // 自分への能力下降・反動は命中時にだけ発動することを明示する。
 out=out.replace(/^攻撃後、自分の(攻撃|防御|特攻|特防|素早さ)/,"攻撃後（命中時）、自分の$1");
 out=out.replace(/^攻撃後、自分の攻撃と防御/,"攻撃後（命中時）、自分の攻撃と防御");
 out=out.replace(/^攻撃後、自分の防御と特防/,"攻撃後（命中時）、自分の防御と特防");
 return out.trim();
}
function defenseInteractionFlags(name,info,target){
 const flags=[];
 // 通常の判定は表示せず、対戦上重要な例外だけを表示する。
 if(PROTECT_BYPASS_MOVES.has(name)) flags.push("まもる貫通");
 if(SUBSTITUTE_BYPASS_MOVES.has(name)||SOUND_MOVES.has(name)) flags.push("みがわり貫通");
 if(BALL_MOVES_EXACT.has(name)) flags.push("ぼうだんで無効");
 if(SOUND_MOVES.has(name)) flags.push("ぼうおんで無効");
 if(MAGIC_BOUNCE_MOVES.has(name) && info.category==="変化") flags.push("マジックミラーで反射");
 return [...new Set(flags)];
}
function moveExtended(name,info){
 const known={...(MOVE_EFFECTS[name]||{}),...(STATUS_EFFECT_OVERRIDES[name]||{}),...(MOVE_DETAIL_CORRECTIONS[name]||{}),...(COMPLETE_MOVE_EFFECTS[name]||{})};
 const target=known.target||defaultTarget(info);
 let effect=known.effect;
 if(!effect){
   if(info.category==="変化") effect="能力変化・状態変化などを与える変化技です。詳細な固有効果は確認中です。";
   else effect="";
 }
 effect=normalizeMoveEffectText(effect);
 const tags=[...new Set([...(known.tags||[]),...inferredTags(name,info)])];
 const extraNotes=[];
 if(ALWAYS_HIT_MOVES.has(name) && !/必中|必ず命中/.test(effect)) extraNotes.push("必中技。命中率・回避率の変化に関係なく命中する。");
 if(DOUBLE_ONLY_MOVES.has(name) && !/ダブルバトル|シングルバトル/.test(effect)) extraNotes.push("ダブルバトルで味方を対象にして使うことを前提とした技。シングルバトルでは効果を活かせない、または失敗する場合がある。");
 if(SPREAD_MOVES_COMPLETE.has(name) && !/複数対象補正|0\.75/.test(effect)) extraNotes.push("ダブルバトルで複数のポケモンを対象にした場合、各対象へのダメージは通常の0.75倍になる。");
 if(info.category!=="変化"){
   POWER_ABILITY_NOTES.forEach(rule=>{if(rule.test(name))extraNotes.push(rule.text)});
 }
 if(extraNotes.length) effect = [effect,...new Set(extraNotes)].filter(Boolean).join(" ");
 const defenseFlags=defenseInteractionFlags(name,info,target);
 return {target,effect:effect||"—",tags,defenseFlags,verified:!!known.effect||extraNotes.length>0};
}
function moveExtraHtml(name,info){
 const ex=moveExtended(name,info);
 const tags=ex.tags.length?`<div class="move-extra-row"><div class="move-extra-label">タグ</div><div class="move-tags">${ex.tags.map(t=>`<span class="move-tag ${/対象|対応/.test(t)?"ability":""}">${t}</span>`).join("")}</div></div>`:"";
 const defense=ex.defenseFlags.length?`<div class="move-extra-row"><div class="move-extra-label">例外判定</div><div class="move-tags">${ex.defenseFlags.map(t=>`<span class="move-tag defense">${t}</span>`).join("")}</div></div>`:"";
 return `<div class="move-extra"><div class="move-extra-row"><div class="move-extra-label">対象</div><div class="move-extra-text">${ex.target}</div></div><div class="move-extra-row"><div class="move-extra-label">効果・追加効果</div><div class="move-extra-text">${ex.effect}</div>${ex.verified?"":'<div class="move-note">固有効果の詳細は確認中です。基本情報と判定可能な技フラグを表示しています。</div>'}</div>${tags}${defense}</div>`;
}

function moveMeta(name){return MOVE_INFO[name]||{category:"分類未確認",type:"不明",power:null,accuracy:null,pp:null,priority:0}}
function val(v){return v===null||v===undefined?"—":v}
function sortMovesAiueo(list){
  return [...list]
    .map(name=>({name,info:moveMeta(name)}))
    .sort((a,b)=>a.name.localeCompare(b.name,"ja",{sensitivity:"base",numeric:true}));
}
function moveListHtml(items){
  if(!items.length)return "";
  return `<div class="move-group all-moves"><h3><span>【技一覧】</span><span>${items.length}個</span></h3><ul class="move-list">${
    items.map(({name,info})=>`<li class="move-item">
      <button class="move-button" type="button" aria-expanded="false"><span class="move-name">${name}</span><span class="move-category">【${info.category}】</span>${typeBadge(info.type,"move-type")}</button>
      <div class="move-detail"><div class="move-specs">
        <div class="move-spec"><div class="label">タイプ</div><div>${typeBadge(info.type)}</div></div>
        <div class="move-spec"><div class="label">分類</div><div>${info.category}</div></div>
        <div class="move-spec"><div class="label">威力</div><div>${val(info.power)}</div></div>
        <div class="move-spec"><div class="label">命中</div><div>${val(info.accuracy)}</div></div>
        <div class="move-spec"><div class="label">PP</div><div>${val(info.pp)}</div></div>
        <div class="move-spec"><div class="label">優先度</div><div>${info.priority>0?"+":""}${info.priority}</div></div>
      </div>${moveExtraHtml(name,info)}</div>
    </li>`).join("")
  }</ul></div>`
}
function renderDetail(){
  const p=POKEMON.find(x=>x.name===selected);if(!p)return;
  const shown=p.moves.filter(m=>norm(m).includes(norm(moveQuery)));
  const sortedMoves=sortMovesAiueo(shown);
  detailEl.innerHTML=`<div class="head"><div><h2 class="name">${p.name}</h2><div class="chips">${p.types.map(t=>typeBadge(t,"chip")).join("")}</div></div><span class="dex">No.${p.dex}</span></div>
  ${matchupHtml(p.types)}
  <section class="section"><h2>能力値</h2><div class="stats">${Object.entries(p.stats).map(([k,v])=>`<div class="stat"><div class="label">${statLabels[k]}</div><div class="value">${p.name==="ヌケニン"&&k==="hp"?1:v+(k==="hp"?75:20)}</div></div>`).join("")}</div></section>
  <section class="section"><h2>素早さ（こだわりスカーフ持ち時）</h2><div class="speed-grid">${speeds(p.stats.spe).map(([l,v])=>`<div class="speed"><div class="label">${l}</div><div class="value">${v}（${Math.floor(v*1.5)}）</div></div>`).join("")}</div></section>
  <section class="section"><h2>特性</h2><p class="help">特性名をタップすると、対戦向けの効果と必要な補足を表示します。</p><div class="abilities">${p.abilities.map(a=>`
    <div class="ability-item">
      <button class="ability-button" type="button" aria-expanded="false">
        <span class="ability-name">${a}</span>
        <span class="ability-toggle">説明を見る</span>
      </button>
      <div class="ability-detail">${renderAbilityInfo(a)}</div>
    </div>`).join("")}</div></section>
  <section class="section"><div class="moves-head"><div><h2 style="margin:0">使用可能な技</h2><div class="help">全 ${p.moves.length} 技／表示 ${shown.length} 技</div></div><input id="moveSearch" class="move-search" type="search" value="${moveQuery}" placeholder="技名を検索"></div>
  <div class="move-groups">${moveListHtml(sortedMoves)}${shown.length?"":'<div class="empty">該当する技がありません。</div>'}</div></section>
  <div class="footer">収録フォーム数：${POKEMON.length}／使用可能技：${p.moves.length}。技は五十音順です。技名をタップすると、効果・対象・タグを表示します。</div>`;
  const ms=document.getElementById("moveSearch");
  ms.addEventListener("input",e=>{moveQuery=e.target.value;renderDetail();const a=document.getElementById("moveSearch");a.focus();a.setSelectionRange(a.value.length,a.value.length)});
  detailEl.querySelectorAll(".move-button").forEach(b=>b.addEventListener("click",()=>{const i=b.closest(".move-item");const open=i.classList.toggle("open");b.setAttribute("aria-expanded",String(open))}))
  detailEl.querySelectorAll(".ability-button").forEach(b=>b.addEventListener("click",()=>{
    const item=b.closest(".ability-item");
    const open=item.classList.toggle("open");
    b.setAttribute("aria-expanded",String(open));
    const label=b.querySelector(".ability-toggle");
    if(label)label.textContent=open?"説明を閉じる":"説明を見る";
  }))
}
function render(){renderList();renderDetail()}
searchEl.addEventListener("input",e=>{query=e.target.value;render()});typeEl.addEventListener("change",e=>{typeFilter=e.target.value;render()});render();
</script></body></html>
